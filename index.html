<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GEEK_IDE_VUE_SPLIT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-base: #181818;
            --sidebar-bg: #252526;
            --activity-bar-bg: #333333;
            --status-blue: #007acc;
            --border: #2b2b2b;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: var(--bg-base); color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden; touch-action: none;
        }

        .layout { display: flex; flex-direction: column; height: 100vh; }
        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar & Activity Bar - как в оригинале */
        .activity-bar { width: 48px; background: var(--activity-bar-bg); display: flex; flex-direction: column; align-items: center; padding-top: 15px; border-right: 1px solid var(--border); }
        .activity-bar i { font-size: 22px; color: #858585; margin-bottom: 25px; cursor: pointer; }
        .sidebar { width: 180px; background: var(--sidebar-bg); border-right: 1px solid var(--border); }
        
        /* РАЗДЕЛЕНИЕ ЭКРАНА */
        .editor-split { flex: 1; display: flex; background: #1e1e1e; }
        
        /* Левая часть - Код */
        .code-section { width: 50%; display: flex; flex-direction: column; border-right: 2px solid #333; position: relative; }
        
        /* Правая часть - Результат */
        .preview-section { width: 50%; background: white; display: flex; flex-direction: column; }
        .preview-header { background: #333; color: #aaa; padding: 5px 15px; font-size: 11px; text-transform: uppercase; }
        #preview-iframe { flex: 1; border: none; background: white; }

        /* Контейнер для Ace */
        #editor { flex: 1; font-size: 14px; }
        .tabs-bar { height: 35px; background: #252526; display: flex; border-bottom: 1px solid var(--border); }
        .tab { padding: 0 15px; background: #1e1e1e; display: flex; align-items: center; font-size: 12px; border-top: 1px solid var(--status-blue); }

        .status-bar { height: 22px; background: var(--status-blue); display: flex; justify-content: space-between; align-items: center; padding: 0 10px; font-size: 12px; }
        .btn-live { background: #fff; color: #000; border: none; padding: 2px 10px; cursor: pointer; font-weight: bold; border-radius: 2px; }
    </style>
</head>
<body>

<div class="layout">
    <div class="main-container">
        <nav class="activity-bar">
            <i class="fa-regular fa-copy"></i>
            <i class="fa-solid fa-cog" style="margin-top: auto; margin-bottom: 10px;"></i>
        </nav>

        <aside class="sidebar">
            <div style="padding:10px; font-size:11px; color:#888;">EXPLORER</div>
            <div style="padding:8px 20px; font-size:13px; color:#fff; background:#37373d;">App.vue</div>
        </aside>

        <main class="editor-split">
            <section class="code-section">
                <div class="tabs-bar"><div class="tab">App.vue</div></div>
                <div id="editor"></div>
            </section>

            <section class="preview-section">
                <div class="preview-header">Live Preview</div>
                <iframe id="preview-iframe"></iframe>
            </section>
        </main>
    </div>

    <footer class="status-bar">
        <div><i class="fa-solid fa-code-branch"></i> main*</div>
        <div>
            <button class="btn-live" onclick="updatePreview()">⚡ Обновить</button>
        </div>
    </footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ace.js"></script>

<script>
    const editor = ace.edit("editor");
    editor.setTheme("ace/theme/one_dark");
    editor.session.setMode("ace/mode/html");
    
    // Начальный код с Vue
    editor.setValue(`<div id="app">
  <h2 style="color: #42b883">{{ title }}</h2>
  <p>Счётчик: {{ count }}</p>
  <button @click="count++" style="padding:10px; cursor:pointer;">Добавить +1</button>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"><\/script>
<script>
  const { createApp } = Vue
  createApp({
    data() { return { title: 'Привет, Брат!', count: 0 } }
  }).mount('#app')
<\/script>`, -1);

    editor.setOptions({
        behavioursEnabled: true,
        wrap: true,
        fontSize: "14px"
    });

    // Функция обновления превью
    function updatePreview() {
        const code = editor.getValue();
        const iframe = document.getElementById('preview-iframe');
        const doc = iframe.contentWindow.document;
        doc.open();
        doc.write(code);
        doc.close();
    }

    // Обновляем при загрузке
    window.onload = updatePreview;
    
    // Авто-ресайз редактора
    window.onresize = () => editor.resize();
</script>
</body>
</html>
